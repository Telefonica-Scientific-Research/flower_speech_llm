# ==============================================================================
# FL Voxtral: Multilingual-mixed IID + FedAvg with Voxtral Mini 3B
#
# End-to-end multimodal model (no separate encoder/connector).
# LoRA applied to Q/K/V/O projections of the LLM decoder.
# ==============================================================================

# ---- Model ----
model-type:          voxtral
voxtral-model-name:  mistralai/Voxtral-Mini-3B-2507
model-cache-dir:     ""
data-language:       en

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16
finetune-encoder:    false

# ---- Federation ----
num-server-rounds:   40
fraction-fit:        0.3
fraction-evaluate:   0.0
min-fit-clients:     2
min-evaluate-clients: 2

# ---- Client Training ----
# Voxtral supports true batching (collator handles variable-length audio).
local-epochs:          10
train-batch-size:      4
train-batch-per-epoch: 200
grad-accumulate-steps: 4
num-workers:           3

# ---- Optimizer ----
max-lr:              0.0001
total-training-step: 10000000
warmup-steps:        100

# ---- LR Decay ----
lr-decay-factor:     0.9
lr-decay-every:      10

# ---- FedProx ----
fedprox-mu:          0.0

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker
csv-test-dir:   flower_speech_llm/fl_MLS_test

# ---- Checkpoints ----
checkpoint-dir:        FL_checkpoints_voxtral
checkpoint-offset:     0
pretrained-checkpoint: ""

# ---- Simulation ----
num-supernodes:        316
client-num-cpus:       4
client-num-gpus:       1.0
