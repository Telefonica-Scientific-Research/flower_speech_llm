# ==============================================================================
# FL Voxtral A1: Multilingual-mixed IID + FedAvg with Voxtral Mini 3B
#
# Same as fl_voxtral.yaml — IID partitioning, FedAvg.
# Explicit A1 naming for consistency across the experiment matrix.
# ==============================================================================

# ---- Model ----
model-type:          voxtral
voxtral-model-name:  mistralai/Voxtral-Mini-3B-2507
model-cache-dir:     ""
data-language:       en

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16
finetune-llm:        true
finetune-encoder:    false

# ---- Federation ----
num-server-rounds:   40
fraction-fit:        0.3
fraction-evaluate:   0.0
min-fit-clients:     2
min-evaluate-clients: 2

# ---- Client Training ----
local-epochs:          10
train-batch-size:      4
train-batch-per-epoch: 200
grad-accumulate-steps: 4
num-workers:           3

# ---- Optimizer ----
max-lr:              0.0001
total-training-step: 2000
warmup-steps:        50

# ---- LR Decay ----
lr-decay-factor:     0.9
lr-decay-every:      10

# ---- FedProx ----
fedprox-mu:          0.0

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker
csv-test-dir:   flower_speech_llm/fl_MLS_test

# ---- Checkpoints ----
checkpoint-dir:        FL_checkpoints_A1_voxtral
checkpoint-offset:     0
pretrained-checkpoint: ""

# ---- Simulation (prefixed with _ to exclude from --run-config) ----
_num-supernodes:        316
_client-num-cpus:       4
_client-num-gpus:       1.0
