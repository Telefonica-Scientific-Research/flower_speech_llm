# ==============================================================================
# Centralized Training: Quick smoke test
#
# Minimal config for verifying the training pipeline works.
# Runs 1 epoch with 50 training batches.
#
# Usage:
#   python -m flower_speech_llm.train_centralized --config configs/centralized_quick_test.yaml
# ==============================================================================

# ---- Model ----
audio-enc-dim:       1024
llm-dim:             2048
audio-encoder-name:  microsoft/wavlm-large
connector-name:      linear
llm-name:            TinyLlama/TinyLlama-1.1B-Chat-v1.0
finetune-encoder:    false
connector-k:         2

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16

# ---- Optimizer ----
max-lr:              0.0001
total-training-step: 2000000
warmup-steps:        1000

# ---- Training (minimal) ----
max-epochs:            1
train-batch-size:      4
grad-accumulate-steps: 2
gradient-clip-val:     1.0
limit-train-batches:   50
limit-val-batches:     20
num-workers:           2
val-check-interval:    1.0

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker

# ---- Checkpoint / Resume ----
pretrained-checkpoint: ""
output-dir:            centralized_checkpoints_test

# ---- Hardware ----
devices:     auto
strategy:    auto
precision:   bf16-mixed

# ---- Logging ----
wandb-project: ""
run-name:      centralized-quick-test
