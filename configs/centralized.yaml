# ==============================================================================
# Centralized Training: SpeechLLM baseline (no federation)
#
# Pools all client data into a single dataset and trains with PyTorch Lightning.
# Hyperparameters match the FL config for direct comparison.
#
# Usage:
#   python -m flower_speech_llm.train_centralized --config configs/centralized.yaml
#
#   # Override specific values via CLI:
#   python -m flower_speech_llm.train_centralized --config configs/centralized.yaml \
#       --max-epochs 5 --devices 0,1
# ==============================================================================

# ---- Model ----
audio-enc-dim:       1024
llm-dim:             2048
audio-encoder-name:  microsoft/wavlm-large
connector-name:      linear
llm-name:            TinyLlama/TinyLlama-1.1B-Chat-v1.0
finetune-encoder:    false
connector-k:         2

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16

# ---- Optimizer ----
max-lr:              0.0001
total-training-step: 2000000
warmup-steps:        1000

# ---- Training ----
max-epochs:            20        # ~18 epochs ≈ 40 FL rounds equivalent
train-batch-size:      8        # true batching with padded audio
grad-accumulate-steps: 2         # effective batch = 16
gradient-clip-val:     1.0
limit-train-batches:   null      # null = full dataset
limit-val-batches:     200
num-workers:           8
val-check-interval:    0.25

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker

# ---- Checkpoint / Resume ----
pretrained-checkpoint: ""
output-dir:            centralized_checkpoints

# ---- Hardware ----
devices:     auto
strategy:    auto
precision:   bf16-mixed

# ---- Logging ----
wandb-project: ""
run-name:      centralized-speech-llm
