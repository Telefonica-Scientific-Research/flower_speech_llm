# ==============================================================================
# Centralized Training: Voxtral Mini 3B — Multi-GPU (4x GPUs)
#
# End-to-end multimodal model (no separate encoder/connector pipeline).
# LoRA applied to Q/K/V/O projections of the LLM decoder; connector is
# fully trainable.  Pools all client data into a single dataset and trains
# with PyTorch Lightning DDP across 4 GPUs.
#
# Usage:
#   python -m flower_speech_llm.train_centralized_voxtral \
#       --config configs/centralized_voxtral.yaml
#
#   # Resume from checkpoint:
#   python -m flower_speech_llm.train_centralized_voxtral \
#       --config configs/centralized_voxtral.yaml \
#       --pretrained-checkpoint centralized_checkpoints_voxtral/adapter-epoch01-step50000-wer0.1500.pt
# ==============================================================================

# ---- Model ----
voxtral-model-name:  mistralai/Voxtral-Mini-3B-2507
model-cache-dir:     ""
data-language:       en
finetune-encoder:    false

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16

# ---- Optimizer (warmup + cosine annealing) ----
max-lr:              0.0001
total-training-step: 2000000
warmup-steps:        1000

# ---- Multi-GPU Training ----
max-epochs:            20
devices:               4
strategy:              ddp
precision:             bf16-mixed
train-batch-size:      4         # per GPU → 4×4 = 16 effective before accum
grad-accumulate-steps: 4         # effective batch = 16×4 = 64 total
gradient-clip-val:     1.0
limit-train-batches:   null      # null = full dataset
limit-val-batches:     200
num-workers:           4
val-check-interval:    0.25

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker
csv-test-dir:   flower_speech_llm/fl_MLS_test

# ---- Checkpoint / Resume ----
pretrained-checkpoint: ""
output-dir:            centralized_checkpoints_voxtral

# ---- Logging ----
wandb-project: ""
run-name:      centralized-voxtral
