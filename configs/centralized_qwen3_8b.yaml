# ==============================================================================
# Centralized Training: WavLM + Qwen3-8B-Instruct-2507
#
# Qwen3-8B delivers frontier-level multilingual quality (119 languages).
# bf16 memory: ~17 GB (model) on L40S 48 GB — comfortable fit.
#
# Usage:
#   python -m flower_speech_llm.train_centralized --config configs/centralized_qwen3_8b.yaml
#
#   # Multi-GPU:
#   python -m flower_speech_llm.train_centralized --config configs/centralized_qwen3_8b.yaml \
#       --devices 0,1
# ==============================================================================

# ---- Model ----
audio-enc-dim:       1280          # Whisper large-v3-turbo encoder dim
llm-dim:             4096          # Qwen3-8B hidden size
audio-encoder-name:  openai/whisper-large-v3-turbo
connector-name:      linear
llm-name:            Qwen/Qwen3-8B-Instruct-2507
finetune-encoder:    false
finetune-llm:        true
connector-k:         2

# ---- LoRA ----
use-lora:            true
lora-r:              8
lora-alpha:          16

# ---- Optimizer ----
max-lr:              0.0001
total-training-step: 2000000
warmup-steps:        1000

# ---- Training ----
max-epochs:            20
train-batch-size:      2          # smaller batch — 8B model uses more memory
grad-accumulate-steps: 8         # effective batch = 16
gradient-clip-val:     1.0
limit-train-batches:   null      # null = full dataset
limit-val-batches:     200
num-workers:           8
val-check-interval:    0.25

# ---- Data ----
csv-train-dir:  flower_speech_llm/fl_A1_mixed_316
csv-dev-dir:    flower_speech_llm/fl_MLS_dev_speaker
csv-test-dir:   flower_speech_llm/fl_MLS_test

# ---- Checkpoint / Resume ----
pretrained-checkpoint: ""
output-dir:            centralized_checkpoints_qwen3_8b
